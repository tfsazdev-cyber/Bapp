trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'

pr:
  branches:
    include:
      - main

variables:
  - group: bda-vars          # links your variable group
  - name: frontendImage
    value: '$(DOCKERHUB_USERNAME)/bda-frontend'
  - name: backendImage
    value: '$(DOCKERHUB_USERNAME)/bda-backend'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:

# ---------------------------------------------------------------
# STAGE 1 - TEST
# ---------------------------------------------------------------
- stage: Test
  displayName: 'Test'
  jobs:
  - job: SmokeTest
    displayName: 'Backend smoke test'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: NodeTool@0
      displayName: 'Use Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: |
        cd backend
        npm install
      displayName: 'npm install'

    - script: |
        cd backend
        NODE_ENV=test JWT_SECRET=ci_test PORT=3001 node server.js &
        PID=$!
        sleep 4
        RESP=$(curl -sf http://localhost:3001/health)
        echo "Response: $RESP"
        kill $PID
        echo "$RESP" | grep -q '"status":"ok"'
        echo "Smoke test passed"
      displayName: 'Health check smoke test'

# ---------------------------------------------------------------
# STAGE 2 - BUILD AND PUSH TO DOCKER HUB
# ---------------------------------------------------------------
- stage: Build
  displayName: 'Build and Push to Docker Hub'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: BuildAndPush
    displayName: 'Build images and push to Docker Hub'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: Docker@2
      displayName: 'Login to Docker Hub'
      inputs:
        command:           login
        containerRegistry: $(DOCKERHUB_SERVICE_CONNECTION)

    - task: Docker@2
      displayName: 'Build and push bda-frontend'
      inputs:
        command:           buildAndPush
        repository:        $(frontendImage)
        dockerfile:        frontend/Dockerfile
        containerRegistry: $(DOCKERHUB_SERVICE_CONNECTION)
        tags: |
          $(imageTag)
          latest

    - task: Docker@2
      displayName: 'Build and push bda-backend'
      inputs:
        command:           buildAndPush
        repository:        $(backendImage)
        dockerfile:        backend/Dockerfile
        containerRegistry: $(DOCKERHUB_SERVICE_CONNECTION)
        tags: |
          $(imageTag)
          latest

    - script: |
        echo "Images pushed to Docker Hub:"
        echo "  docker.io/$(frontendImage):$(imageTag)"
        echo "  docker.io/$(frontendImage):latest"
        echo "  docker.io/$(backendImage):$(imageTag)"
        echo "  docker.io/$(backendImage):latest"
      displayName: 'Print image tags'

# ---------------------------------------------------------------
# STAGE 3 - DEPLOY TO PRODUCTION SERVER
# ---------------------------------------------------------------
- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: Production
    displayName: 'Deploy to VPS via SSH'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: SSH@0
            displayName: 'SSH - pull images and restart containers'
            inputs:
              sshEndpoint: $(SSH_SERVICE_CONNECTION)
              runOptions:  inline
              inline: |
                set -e
                echo "BDA Portal - Deploying build $(Build.BuildId)"
                echo "Time: $(date)"

                cd /opt/bda-app

                git pull origin main

                echo "$(DOCKERHUB_PASSWORD)" | docker login -u "$(DOCKERHUB_USERNAME)" --password-stdin

                docker pull $(frontendImage):latest
                docker pull $(backendImage):latest

                FRONTEND_IMAGE=$(frontendImage):latest BACKEND_IMAGE=$(backendImage):latest docker compose up -d --no-build frontend backend

                sleep 5
                docker compose ps
                docker image prune -f

                echo "Deployment complete - build $(Build.BuildId)"

          - script: |
              sleep 10
              echo "Checking API health..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.$(DOMAIN)/health || echo "000")
              echo "HTTP Status: $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "API is live and healthy"
              else
                echo "Health check FAILED - HTTP $STATUS"
                exit 1
              fi
            displayName: 'Post-deploy health check'
            env:
              DOMAIN: $(DOMAIN)
