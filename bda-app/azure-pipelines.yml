trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'

pr:
  branches:
    include:
      - main

variables:
  - group: bda-vars
  - name: frontendImage
    value: '$(DOCKERHUB_USERNAME)/bda-frontend'
  - name: backendImage
    value: '$(DOCKERHUB_USERNAME)/bda-backend'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:

# ---------------------------------------------------------------
# STAGE 1 - TEST
# ---------------------------------------------------------------
- stage: Test
  displayName: 'Test'
  jobs:
  - job: SmokeTest
    displayName: 'Backend smoke test'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: NodeTool@0
      displayName: 'Use Node.js 20'
      inputs:
        versionSpec: '20.x'

    # Show repo structure so we know exact paths
    - script: |
        echo "====== Repo root ======"
        ls -la $(Build.SourcesDirectory)
        echo ""
        echo "====== Looking for package.json ======"
        find $(Build.SourcesDirectory) -name "package.json" -not -path "*/node_modules/*"
      displayName: 'Show repo structure'

    # Auto-detect backend folder and install
    - script: |
        BACKEND=$(find $(Build.SourcesDirectory) -name "package.json" -not -path "*/node_modules/*" | head -1 | xargs dirname)
        echo "Backend found at: $BACKEND"
        cd $BACKEND
        npm install
      displayName: 'npm install'

    # Auto-detect backend folder and smoke test
    - script: |
        BACKEND=$(find $(Build.SourcesDirectory) -name "package.json" -not -path "*/node_modules/*" | head -1 | xargs dirname)
        echo "Backend found at: $BACKEND"
        cd $BACKEND
        NODE_ENV=test JWT_SECRET=ci_test PORT=3001 node server.js &
        PID=$!
        sleep 4
        RESP=$(curl -sf http://localhost:3001/health || echo "FAILED")
        echo "Response: $RESP"
        kill $PID 2>/dev/null || true
        echo "$RESP" | grep -q '"status":"ok"' && echo "Smoke test passed" || (echo "Smoke test failed" && exit 1)
      displayName: 'Health check smoke test'

# ---------------------------------------------------------------
# STAGE 2 - BUILD AND PUSH TO DOCKER HUB
# ---------------------------------------------------------------
- stage: Build
  displayName: 'Build and Push to Docker Hub'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: BuildAndPush
    displayName: 'Build images and push to Docker Hub'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # Show structure again so we know Dockerfile locations
    - script: |
        echo "====== Looking for Dockerfiles ======"
        find $(Build.SourcesDirectory) -name "Dockerfile"
      displayName: 'Show Dockerfile locations'

    - task: Docker@2
      displayName: 'Login to Docker Hub'
      inputs:
        command:           login
        containerRegistry: $(DOCKERHUB_SERVICE_CONNECTION)

    # Build + push FRONTEND — auto-detect context path
    - script: |
        FRONTEND_DIR=$(find $(Build.SourcesDirectory) -path "*/frontend/Dockerfile" | head -1 | xargs dirname)
        echo "Frontend dir: $FRONTEND_DIR"
        docker build -t $(frontendImage):$(imageTag) -t $(frontendImage):latest $FRONTEND_DIR
        docker push $(frontendImage):$(imageTag)
        docker push $(frontendImage):latest
        echo "Pushed $(frontendImage):$(imageTag)"
      displayName: 'Build and push bda-frontend'

    # Build + push BACKEND — auto-detect context path
    - script: |
        BACKEND_DIR=$(find $(Build.SourcesDirectory) -path "*/backend/Dockerfile" | head -1 | xargs dirname)
        echo "Backend dir: $BACKEND_DIR"
        docker build -t $(backendImage):$(imageTag) -t $(backendImage):latest $BACKEND_DIR
        docker push $(backendImage):$(imageTag)
        docker push $(backendImage):latest
        echo "Pushed $(backendImage):$(imageTag)"
      displayName: 'Build and push bda-backend'

    - script: |
        echo "Images pushed to Docker Hub:"
        echo "  docker.io/$(frontendImage):$(imageTag)"
        echo "  docker.io/$(frontendImage):latest"
        echo "  docker.io/$(backendImage):$(imageTag)"
        echo "  docker.io/$(backendImage):latest"
      displayName: 'Print image tags'

# ---------------------------------------------------------------
# STAGE 3 - DEPLOY TO PRODUCTION SERVER
# ---------------------------------------------------------------
- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: Production
    displayName: 'Deploy to VPS via SSH'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: SSH@0
            displayName: 'SSH - pull images and restart containers'
            inputs:
              sshEndpoint: $(SSH_SERVICE_CONNECTION)
              runOptions:  inline
              inline: |
                set -e
                echo "BDA Portal - Deploying build $(Build.BuildId)"
                echo "Time: $(date)"

                cd /opt/bda-app

                git pull origin main

                echo "$(DOCKERHUB_PASSWORD)" | docker login -u "$(DOCKERHUB_USERNAME)" --password-stdin

                docker pull $(frontendImage):latest
                docker pull $(backendImage):latest

                FRONTEND_IMAGE=$(frontendImage):latest BACKEND_IMAGE=$(backendImage):latest docker compose up -d --no-build frontend backend

                sleep 5
                docker compose ps
                docker image prune -f

                echo "Deployment complete - build $(Build.BuildId)"

          - script: |
              sleep 10
              echo "Checking API health..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.$(DOMAIN)/health || echo "000")
              echo "HTTP Status: $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "API is live and healthy"
              else
                echo "Health check FAILED - HTTP $STATUS"
                exit 1
              fi
            displayName: 'Post-deploy health check'
            env:
              DOMAIN: $(DOMAIN)
