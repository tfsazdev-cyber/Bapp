# ══════════════════════════════════════════════════════════════
#  Traefik v3 — Static Configuration
#  File: traefik/traefik.yml
# ══════════════════════════════════════════════════════════════

# ── API / Dashboard ────────────────────────────────────────────
api:
  dashboard: true          # enable the Traefik dashboard
  insecure:  false         # dashboard is behind auth (see docker-compose)

# ── Entrypoints ────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to:     websecure   # auto-redirect ALL HTTP → HTTPS
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt  # default cert for all routers

# ── Certificate resolver (Let's Encrypt) ───────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      email:   "${ACME_EMAIL}"          # from .env
      storage: /letsencrypt/acme.json   # persisted in a volume
      httpChallenge:
        entryPoint: web                 # LE verifies via HTTP-01

# ── Providers ──────────────────────────────────────────────────
providers:
  docker:
    exposedByDefault: false   # containers must opt-in via labels
    network: bda_network
  file:
    filename: /etc/traefik/dynamic.yml  # middleware definitions
    watch: true

# ── Logging ────────────────────────────────────────────────────
log:
  level: INFO               # DEBUG for troubleshooting

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100
